<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gerador EBD Fiel</title>
    <!-- PDF.js para extrair texto do PDF -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.min.js"></script>
    <script>
        // Configurar o worker do pdf.js
        pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.worker.min.js';
    </script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', Arial, sans-serif;
            background: linear-gradient(135deg, #0a0f2a 0%, #0a1626 100%);
            color: #eef6fc;
            min-height: 100vh;
            padding: 20px;
        }
        .container { max-width: 1400px; margin: 0 auto; }
        .header {
            text-align: center;
            margin-bottom: 30px;
            padding: 30px;
            background: rgba(255,255,255,.05);
            border-radius: 20px;
            border: 1px solid rgba(255,255,255,.1);
        }
        .header h1 { color: #f7b24d; margin-bottom: 10px; }
        .header p { color: #a7bacb; }
        .panel {
            background: rgba(16,27,43,.8);
            border-radius: 20px;
            padding: 25px;
            margin-bottom: 20px;
            border: 1px solid rgba(255,255,255,.1);
        }
        .panel h2 { margin-bottom: 15px; color: #38bdf8; }
        .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-bottom: 15px; }
        label { display: block; margin-bottom: 8px; font-weight: bold; color: #f7b24d; }
        input, select, textarea {
            width: 100%;
            padding: 12px;
            border-radius: 10px;
            border: 1px solid rgba(255,255,255,.2);
            background: rgba(0,0,0,.3);
            color: #fff;
            font-size: 14px;
        }
        textarea { min-height: 300px; font-family: monospace; resize: vertical; }
        button {
            padding: 12px 24px;
            border: none;
            border-radius: 30px;
            font-weight: bold;
            cursor: pointer;
            margin-right: 10px;
            margin-top: 10px;
            transition: transform 0.2s;
        }
        button:hover { transform: translateY(-2px); }
        .btn-primary { background: linear-gradient(135deg, #f7b24d, #ff9800); color: #102131; }
        .btn-secondary { background: #2a3d5a; color: #fff; }
        .btn-success { background: #22c55e; color: #fff; }
        .btn-html { background: #0f766e; color: #fff; }
        .btn-preview { background: #2563eb; color: #fff; }
        .btn-pdf { background: #dc2626; color: #fff; }
        .btn-upload { background: #7c3aed; color: #fff; }
        .status { margin-top: 15px; padding: 12px; border-radius: 10px; }
        .status.ok { background: rgba(34,197,94,.2); color: #86efac; border-left: 4px solid #22c55e; }
        .status.erro { background: rgba(239,68,68,.2); color: #fca5a5; border-left: 4px solid #ef4444; }
        .status.warning { background: rgba(245,158,11,.2); color: #fbbf24; border-left: 4px solid #f59e0b; }
        .resultado {
            background: #0f1b2e;
            border-radius: 16px;
            padding: 25px;
            min-height: 500px;
            white-space: pre-wrap;
            font-family: 'Segoe UI', Arial, sans-serif;
            font-size: 14px;
            line-height: 1.6;
            overflow-x: auto;
            border: 1px solid rgba(255,255,255,.1);
        }
        .loading { opacity: 0.6; pointer-events: none; }
        .small-note { font-size: 12px; color: #a7bacb; margin-top: 8px; }
        .file-input-wrapper {
            display: flex;
            gap: 10px;
            align-items: center;
            margin-top: 8px;
        }
        .file-input-wrapper input {
            flex: 1;
            background: rgba(0,0,0,.3);
        }
        @media (max-width: 700px) { .grid-2 { grid-template-columns: 1fr; } }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>✨ Gerador de Lições EBD</h1>
            <p>Cole o conteúdo completo da revista ou faça upload de um arquivo PDF.</p>
        </div>
        
        <div class="panel">
            <h2>📖 Entrada da Revista</h2>
            <div class="grid-2">
                <div>
                    <label>👥 Público</label>
                    <select id="publico">
                        <option value="adultos">Adultos</option>
                        <option value="jovens">Jovens</option>
                    </select>
                </div>
                <div>
                    <label>📌 Título da Lição</label>
                    <input id="titulo" placeholder="Ex: Lição 1: O chamado que transforma a dor em propósito">
                </div>
            </div>
            <div>
                <label>📄 Texto da Revista (completo)</label>
                <textarea id="texto" placeholder="Cole aqui o texto completo da revista..."></textarea>
                <div class="small-note">Ou faça upload de um PDF para extrair o texto automaticamente.</div>
                <div class="file-input-wrapper">
                    <input type="file" id="pdfFile" accept="application/pdf">
                    <button class="btn-upload" onclick="extrairPDF()" style="margin-top:0;">📄 Extrair Texto do PDF</button>
                </div>
            </div>
            <div>
                <button class="btn-primary" onclick="gerar()">✨ Gerar Lição</button>
                <button class="btn-secondary" onclick="limpar()">🗑️ Limpar</button>
                <button class="btn-success" onclick="copiar()">📋 Copiar Texto</button>
                <button class="btn-html" onclick="copiarHTML()">🌐 Copiar HTML</button>
                <button class="btn-preview" onclick="visualizarHTML()">👁️ Visualizar HTML</button>
                <button class="btn-pdf" onclick="imprimirPDF()">🖨️ Imprimir / PDF</button>
                <button class="btn-word" onclick="baixarWord()">📄 Baixar Word</button>
            </div>
            <div id="status" class="status"></div>
        </div>
        
        <div class="panel">
            <h2>📚 Lição Gerada</h2>
            <div id="resultado" class="resultado"></div>
        </div>
    </div>

    <script>
        let ultimoResultado = '';

        function extrairTituloDoTexto() {
            const texto = document.getElementById('texto').value;
            const linhas = texto.split('\n');
            for (let linha of linhas) {
                const linhaTrim = linha.trim();
                if (linhaTrim.match(/^LIÇÃO\s+\d+[:\s]+/i)) {
                    document.getElementById('titulo').value = linhaTrim;
                    break;
                }
            }
        }
        document.getElementById('texto').addEventListener('input', extrairTituloDoTexto);

        async function extrairPDF() {
            const fileInput = document.getElementById('pdfFile');
            const file = fileInput.files[0];
            if (!file) {
                alert('Selecione um arquivo PDF primeiro.');
                return;
            }

            const statusDiv = document.getElementById('status');
            statusDiv.innerText = "⏳ Extraindo texto do PDF...";
            statusDiv.className = "status warning";
            
            try {
                const arrayBuffer = await file.arrayBuffer();
                const pdf = await pdfjsLib.getDocument({ data: arrayBuffer }).promise;
                let fullText = "";
                
                for (let i = 1; i <= pdf.numPages; i++) {
                    const page = await pdf.getPage(i);
                    const textContent = await page.getTextContent();
                    const pageText = textContent.items.map(item => item.str).join(' ');
                    fullText += pageText + "\n\n";
                }
                
                document.getElementById('texto').value = fullText.trim();
                extrairTituloDoTexto(); // Tenta extrair título do texto colado
                statusDiv.innerText = "✅ Texto extraído com sucesso! Verifique e ajuste se necessário.";
                statusDiv.className = "status ok";
                
            } catch (error) {
                console.error('Erro ao extrair PDF:', error);
                statusDiv.innerText = "❌ Erro ao extrair texto do PDF. Verifique se o arquivo é válido.";
                statusDiv.className = "status erro";
            }
        }

        async function gerar() {
            const titulo = document.getElementById('titulo').value.trim();
            const texto = document.getElementById('texto').value.trim();
            const publico = document.getElementById('publico').value;
            const statusDiv = document.getElementById('status');
            const resultadoDiv = document.getElementById('resultado');
            const panel = document.querySelector('.panel');
            
            if (!titulo) {
                statusDiv.innerText = "❌ Preencha o título (ou ele será detectado automaticamente ao colar o texto)";
                statusDiv.className = "status erro";
                return;
            }
            if (!texto) {
                statusDiv.innerText = "❌ Cole o texto da revista ou extraia de um PDF";
                statusDiv.className = "status erro";
                return;
            }
            
            panel.classList.add('loading');
            statusDiv.innerText = "⏳ Gerando... Isso pode levar até 2 minutos";
            statusDiv.className = "status";
            resultadoDiv.innerHTML = '<div style="text-align:center; padding:40px;">🔄 Processando... Aguarde</div>';
            
            try {
                const response = await fetch('/api/gerar-licao-completa', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ titulo, textoOriginal: texto, publico })
                });
                const data = await response.json();
                if (!response.ok) throw new Error(data.error);
                
                ultimoResultado = data.licaoCompleta;
                resultadoDiv.innerHTML = ultimoResultado;
                statusDiv.innerText = "✅ Lição gerada com sucesso!";
                statusDiv.className = "status ok";
            } catch (error) {
                statusDiv.innerText = "❌ Erro: " + error.message;
                statusDiv.className = "status erro";
                resultadoDiv.innerHTML = '<div style="color:#fca5a5; text-align:center;">Erro ao gerar lição</div>';
                ultimoResultado = '';
            } finally {
                panel.classList.remove('loading');
            }
        }
        
        function limpar() {
            document.getElementById('titulo').value = '';
            document.getElementById('texto').value = '';
            document.getElementById('resultado').innerHTML = '';
            document.getElementById('status').innerHTML = '';
            document.getElementById('status').className = 'status';
            document.getElementById('pdfFile').value = '';
            ultimoResultado = '';
        }
        
        async function copiar() {
            const texto = document.getElementById('resultado').innerText;
            if (!texto || texto.includes('Processando')) {
                alert('Nada para copiar');
                return;
            }
            await navigator.clipboard.writeText(texto);
            alert('Texto copiado!');
        }
        
        function gerarHTMLCompleto() {
            if (!ultimoResultado) return '';
            let html = ultimoResultado;

            html = html.replace(/^# (.*)$/gm, '<h1>$1</h1>');
            html = html.replace(/^## (.*)$/gm, (match, content) => {
                let clean = content.replace(/<\/?strong>/g, '');
                return `<h2>${clean}</h2>`;
            });
            html = html.replace(/^### (.*)$/gm, (match, content) => {
                let clean = content.replace(/<\/?strong>/g, '');
                return `<h3>${clean}</h3>`;
            });

            html = html.replace(/^---$/gm, '<hr>');
            html = html.replace(/^(\d+\.) (.*)$/gm, (match, num, title) => `<h3>${num} ${title}</h3>`);
            html = html.replace(/^(\d+\.\d+\.) (.*)$/gm, (match, num, title) => `<h3>${num} ${title}</h3>`);
            html = html.replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>');

            html = html.split('\n\n').map(par => {
                par = par.trim();
                if (!par) return '';
                if (par.startsWith('<h') || par.startsWith('<div') || par.startsWith('<hr') || par.startsWith('<blockquote')) return par;
                return `<p>${par.replace(/\n/g, '<br>')}</p>`;
            }).join('\n\n');

            return `<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Lição EBD</title>
    <style>
        body { font-family: 'Arial', sans-serif; line-height: 1.6; max-width: 900px; margin: 0 auto; padding: 2rem; background: #f9fafb; color: #111827; }
        h1 { font-size: 1.8rem; color: #b45309; border-bottom: 2px solid #e5e7eb; padding-bottom: 0.5rem; }
        h2 { font-size: 1.5rem; margin-top: 1.5rem; color: #1f2937; border-left: 4px solid #f59e0b; padding-left: 0.75rem; }
        h3 { font-size: 1.3rem; margin-top: 1.2rem; color: #1f2937; }
        .support-box { background: #f1f5f9; padding: 1rem; border-radius: 12px; margin: 1rem 0; border-left: 4px solid #3b82f6; }
        .practice-box { background: #f0fdf4; padding: 1rem; border-radius: 12px; margin: 1rem 0; border-left: 4px solid #22c55e; }
        .reading-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 1rem; margin: 1rem 0; }
        .reading-day { background: #eef2ff; padding: 0.75rem; border-radius: 8px; font-size: 0.9rem; }
        blockquote { background: #f3f4f6; padding: 1rem; border-radius: 12px; margin: 1rem 0; font-style: italic; }
        hr { margin: 1.5rem 0; border-color: #e5e7eb; }
        p { margin: 0.75rem 0; }
    </style>
</head>
<body>
${html}
</body>
</html>`;
        }

        async function copiarHTML() {
            if (!ultimoResultado) {
                alert('Gere uma lição primeiro');
                return;
            }
            const htmlCompleto = gerarHTMLCompleto();
            await navigator.clipboard.writeText(htmlCompleto);
            alert('HTML copiado!');
        }

        function visualizarHTML() {
            if (!ultimoResultado) {
                alert('Gere uma lição primeiro');
                return;
            }
            const htmlCompleto = gerarHTMLCompleto();
            const novaAba = window.open();
            novaAba.document.write(htmlCompleto);
            novaAba.document.close();
        }

        function imprimirPDF() {
            if (!ultimoResultado) {
                alert('Gere uma lição primeiro');
                return;
            }
            const htmlCompleto = gerarHTMLCompleto();
            const janelaImpressao = window.open('', '_blank');
            janelaImpressao.document.write(htmlCompleto);
            janelaImpressao.document.close();
            janelaImpressao.print();
        }

        function baixarWord() {
            if (!ultimoResultado) {
                alert('Gere uma lição primeiro');
                return;
            }
            const conteudoHTML = gerarHTMLCompleto();
            const blob = new Blob([conteudoHTML], { type: 'application/msword' });
            const link = document.createElement('a');
            const url = URL.createObjectURL(blob);
            link.href = url;
            link.download = `Licao_${new Date().toISOString().slice(0,19).replace(/:/g, '-')}.doc`;
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);
            URL.revokeObjectURL(url);
        }
    </script>
</body>
</html>
